<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Available Tasks | UK WRITERS HUB</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f6fb;
margin:0;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:20px;
}

.task{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.task h2{
margin-top:0;
color:#1565C0;
}

.price{
font-size:24px;
color:green;
font-weight:bold;
}

button{
background:#1565C0;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

</style>

</head>

<body>

<header>

<h1>Available Writing Tasks</h1>

</header>

<div class="container">

<p
id="membershipWarning"
style="
color:red;
font-weight:bold;
font-size:18px;
">
</p>

<div class="container">
<div class="task-top-bar">

<input
type="text"
id="searchTask"
placeholder="🔍 Search writing jobs...">

<select id="categoryFilter">

<option value="">All Categories</option>

<option>Academic Writing</option>

<option>Article Writing</option>

<option>Essay Writing</option>

<option>Research Writing</option>

<option>Technical Writing</option>

<option>Business Writing</option>

</select>

</div>

<div id="tasksContainer" class="task-grid">

</div>
<script type="module" src="tasks.js"></script>
  <script type="module" src="tasks-loader.js"></script>
</body>
</html>

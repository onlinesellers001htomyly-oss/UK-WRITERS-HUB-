<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | UK WRITERS HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">🇬🇧 UK WRITERS HUB</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<nav id="mobileMenu" class="nav">

<a href="index.html">Home</a>

<a href="register.html">Register</a>

<a href="login.html">Login</a>

</nav>

</header>

<section class="section auth-section">

<div class="auth-card">

<h1>Login</h1>

<p>

Welcome back to UK WRITERS HUB

</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="submit"
class="btn primary">

Login

</button>

</form>

<p>

Don't have an account?

<a href="register.html">

Register Here

</a>

</p>

</div>

</section>

<footer class="footer">

<p>© 2026 UK WRITERS HUB</p>

</footer>

<script type="module">

import { auth, db } from "./firebase.js";

import {

signInWithEmailAndPassword

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {

doc,

getDoc

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

document.getElementById("loginForm").addEventListener("submit",async(e)=>{

e.preventDefault();

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

try{

const userCredential=await signInWithEmailAndPassword(

auth,

email,

password

);

const user=userCredential.user;

const snap=await getDoc(doc(db,"users",user.uid));

if(!snap.exists()){

alert("User profile not found.");

return;

}

const data=snap.data();

/* Change this email to your admin email */

if(data.email==="youradmin@email.com"){

window.location="admin.html";

}else{

window.location="dashboard.html";

}

}catch(error){

alert(error.message);

}

});

</script>

<script src="script.js"></script>

</body>

  </html>

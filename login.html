<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | UK WRITERS HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">🇬🇧 UK WRITERS HUB</div>

<button class="menu-btn" onclick="toggleMenu()">☰</button>

<nav id="mobileMenu" class="nav">

<a href="index.html">Home</a>

<a href="register.html">Register</a>

<a href="login.html">Login</a>

</nav>

</header>

<section class="section auth-section">

<div class="auth-card">

<h1>Login</h1>

<p>

Welcome back to UK WRITERS HUB

</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="submit"
class="btn primary">

Login

</button>

</form>

<p>

Don't have an account?

<a href="register.html">

Register Here

</a>
<p style="text-align:center;margin-top:15px;">
<a href="forgot-password.html"
style="color:#1565C0;font-weight:bold;text-decoration:none;">
Forgot Password?
</a>
</p>
</p>

</div>

</section>

<footer class="footer">

<p>© 2026 UK WRITERS HUB</p>

</footer>

<script type="module">

import { auth, db } from "./firebase.js";

import {
  signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const btn = form.querySelector("button");
    btn.disabled = true;
    btn.innerHTML = "Signing In...";

    const email = document.getElementById("email").value.trim().toLowerCase();
    const password = document.getElementById("password").value;

    try {

        const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        const user = userCredential.user;

        const userRef = doc(db, "users", user.uid);

        const snap = await getDoc(userRef);

        if (!snap.exists()) {

            alert("Your profile was not found. Please contact the administrator.");

            btn.disabled = false;
            btn.innerHTML = "Login";

            return;
        }

        const data = snap.data();

        if (data.role === "admin") {

            window.location = "admin.html";

        } else {

            window.location = "dashboard.html";

        }

    } catch (error) {

        console.error(error);

        if (error.code === "auth/invalid-credential") {

            alert("Invalid email or password.");

        } else if (error.code === "auth/user-not-found") {

            alert("Account not found.");

        } else if (error.code === "auth/wrong-password") {

            alert("Incorrect password.");

        } else {

            alert(error.message);

        }

        btn.disabled = false;
        btn.innerHTML = "Login";

    }

});

            </script>

<script src="script.js"></script>

</body>

  </html>

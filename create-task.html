<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Task | UK WRITERS HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">🇬🇧 UK WRITERS HUB ADMIN</div>

<nav class="nav">

<a href="dashboard.html">Dashboard</a>

<a href="tasks.html">Tasks</a>

<a href="admin.html">Admin Panel</a>

</nav>

</header>

<section class="section">

<div class="auth-card">

<h1>Create New Task</h1>

<form id="taskForm">

<input
type="text"
id="title"
placeholder="Task Title"
required>

<input
type="text"
id="category"
placeholder="Category"
required>

<input
type="number"
id="budget"
placeholder="Budget (USD)"
required>

<input
type="date"
id="deadline"
required>

<textarea
id="description"
placeholder="Task Description"
rows="6"
required></textarea>

<button
type="submit"
class="btn primary">

Create Task

</button>

</form>

<p id="message"></p>

</div>

</section>

<footer class="footer">

<p>© 2026 UK WRITERS HUB</p>

</footer>

<script type="module" src="create-task.js"></script>

</body>
  </html>

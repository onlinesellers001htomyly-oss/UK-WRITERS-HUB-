<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin - Users | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;

header{

color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1300px;
margin:30px auto;
}

.card{

padding:20px;
border-radius:10px;

input{
width:100%;
padding:12px;
margin-bottom:20px;
border:1px solid #ccc;

box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#1565C0;
color:white;
padding:12px;
}

td{
padding:12px;
border:1px solid #ddd;

}

button{
padding:8px 15px;
margin:2px;
border:none;

}

.activate{

}

.suspend{

}

.delete{

}

.view{

<table>

<th>Name</th>

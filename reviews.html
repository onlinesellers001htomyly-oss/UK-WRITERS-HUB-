<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reviews | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1000px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.stars{
font-size:22px;
color:#FFC107;
}

textarea{
width:100%;
height:120px;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-top:15px;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:14px;
width:100%;
background:#1565C0;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Client Reviews</p>

</header>

<div class="container">

<div class="card">

<h2>No Reviews Yet</h2>

<p>Reviews from completed jobs will appear here.</p>

<p class="stars">★★★★★</p>

<textarea placeholder="Write your review..."></textarea>

<button>Submit Review</button>

</div>

</div>

</body>
  </html>

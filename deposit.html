<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Membership | UK WRITERS HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">🇬🇧 UK WRITERS HUB</div>

</header>

<section class="section">

<div class="auth-card">

<h1>Activate Your Membership</h1>

<h2>$10 USD</h2>

<p>

Complete your membership payment to unlock:

</p>

<ul>

<li>✔ Access all writing tasks</li>

<li>✔ Bid for client jobs</li>

<li>✔ Earn $3 per successful referral</li>

<li>✔ Withdraw earnings (Minimum $50)</li>

</ul>

<button
id="payButton"
class="btn primary">

Proceed to Payment

</button>

</div>

</section>

<script type="module">

import { auth, db } from "./firebase.js";

import {

doc,

updateDoc

} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

document.getElementById("payButton").addEventListener("click",async()=>{

const user=auth.currentUser;

if(!user){

alert("Please login first.");

window.location="login.html";

return;

}

await updateDoc(doc(db,"users",user.uid),{

paymentStatus:"Pending"

});

alert("Payment page will be connected to Flutterwave in the next step.");

});

</script>

</body>

</html>

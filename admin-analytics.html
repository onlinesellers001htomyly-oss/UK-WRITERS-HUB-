<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Analytics | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#F4F6FB;
}

header{
background:#0D47A1;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1300px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
text-align:center;
}

.card h3{
margin:0;
color:#1565C0;
}

.number{
font-size:35px;
font-weight:bold;
margin-top:15px;
color:#2E7D32;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

th{
background:#1565C0;
color:white;
padding:12px;
}

td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Administrator Analytics Dashboard</p>

</header>

<div class="container">

<div class="grid">

<div class="card">

<h3>Total Members</h3>

<div class="number">0</div>

</div>

<div class="card">

<h3>Active Members</h3>

<div class="number">0</div>

</div>

<div class="card">

<h3>Pending Activations</h3>

<div class="number">0</div>

</div>

<div class="card">

<h3>Total Jobs</h3>

<div class="number">0</div>

</div>

<div class="card">

<h3>Completed Jobs</h3>

<div class="number">0</div>

</div>

<div class="card">

<h3>Pending Withdrawals</h3>

<div class="number">0</div>

</div>

<div class="card">

<h3>Total Referral Rewards</h3>

<div class="number">$0.00</div>

</div>

<div class="card">

<h3>Total Platform Revenue</h3>

<div class="number">$0.00</div>

</div>

</div>

<table>

<tr>

<th>Recent Activity</th>

<th>Status</th>

<th>Date</th>

</tr>

<tr>

<td colspan="3">

No recent activity.

</td>

</tr>

</table>

</div>

</body>

  </html>

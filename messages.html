<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Messages | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1100px;
margin:30px auto;
}

.chat-box{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
height:500px;
display:flex;
flex-direction:column;
}

.messages{
flex:1;
overflow-y:auto;
padding:10px;
border:1px solid #ddd;
margin-bottom:15px;
}

.empty{
text-align:center;
color:#777;
margin-top:150px;
}

textarea{
width:100%;
height:80px;
padding:12px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
box-sizing:border-box;
}

button{
margin-top:10px;
padding:12px;
width:100%;
background:#1565C0;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0D47A1;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Messages</p>

</header>

<div class="container">

<div class="chat-box">

<div class="messages">

<div class="empty">

No conversations yet.

When you are awarded a job, you'll be able to communicate with the client here.

</div>

</div>

<textarea placeholder="Type your message..."></textarea>

<button>

Send Message

</button>

</div>

</div>

</body>
  </html>

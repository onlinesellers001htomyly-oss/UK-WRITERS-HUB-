<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Accepted Jobs | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
}

header{
background:#2E7D32;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1200px;
margin:30px auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card h2{
margin-top:0;
color:#2E7D32;
}

.info{
margin:10px 0;
}

button{
padding:12px 20px;
background:#2E7D32;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#1B5E20;
}

.upload{
margin-top:15px;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Accepted Jobs</p>

</header>

<div class="container">

<div class="card">

<h2>No Accepted Jobs Yet</h2>

<p class="info">

When a client accepts one of your bids, the job will appear here.

</p>

<p class="info">

This page will display:

</p>

<ul>

<li>Job title</li>

<li>Client instructions</li>

<li>Budget</li>

<li>Deadline</li>

<li>Progress status</li>

<li>Payment status</li>

</ul>

<div class="upload">

<label><strong>Upload Completed Work</strong></label>

<input type="file">

</div>

<button>

Submit Completed Work

</button>

</div>

</div>

</body>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post Project | UK WRITERS HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">
🇬🇧 UK WRITERS HUB
</div>

</header>

<section class="section">

<div class="card">

<h2>Post a New Project</h2>

<input
type="text"
id="title"
placeholder="Project Title">

<br><br>

<textarea
id="description"
rows="6"
placeholder="Project Description"></textarea>

<br><br>

<input
type="number"
id="budget"
placeholder="Budget in USD">

<br><br>

<input
type="date"
id="deadline">

<br><br>

<button onclick="postProject()">

Publish Project

</button>

</div>

</section>

<script type="module" src="post-project.js"></script>

</body>

  </html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Announcements | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#F4F6FB;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

textarea{
width:100%;
height:180px;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
resize:none;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
background:#1565C0;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}

button:hover{
background:#0D47A1;
}

.notice{
border-left:6px solid #1565C0;
padding:15px;
background:#E3F2FD;
margin-top:15px;
}

.date{
color:gray;
font-size:14px;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Platform Announcements</p>

</header>

<div class="container">

<div class="card">

<h2>Create Announcement</h2>

<input
type="text"
placeholder="Announcement Title">

<textarea
placeholder="Write your announcement here..."></textarea>

<button>

Publish Announcement

</button>

</div>

<div class="card">

<h2>Latest Announcements</h2>

<div class="notice">

<h3>Welcome to UK WRITERS HUB</h3>

<p>

Announcements from the administrator will appear here.

</p>

<p class="date">

Date: --/--/----

</p>

</div>

</div>

</div>

</body>

  </html>

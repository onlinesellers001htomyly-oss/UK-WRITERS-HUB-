<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Post a Job | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f7fb;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1000px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card h2{
margin-top:0;
color:#1565C0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:14px;
background:#1565C0;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.note{
margin-top:20px;
padding:15px;
background:#E3F2FD;
border-left:5px solid #1565C0;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Post a Writing Job</p>

</header>

<div class="container">

<div class="card">

<h2>Create New Job</h2>

<form>

<label>Job Title</label>

<input type="text" placeholder="Example: Nursing Assignment">

<label>Category</label>

<select>

<option>Academic Writing</option>

<option>Article Writing</option>

<option>Research Paper</option>

<option>Essay</option>

<option>Blog Writing</option>

<option>Business Writing</option>

<option>Technical Writing</option>

</select>

<label>Description</label>

<textarea rows="7" placeholder="Describe the project requirements"></textarea>

<label>Budget (USD)</label>

<input type="number" placeholder="50">

<label>Deadline</label>

<input type="date">

<label>Attachments (Optional)</label>

<input type="file">

<button type="submit">

Publish Job

</button>

</form>

<div class="note">

<strong>Note:</strong> Your job will be reviewed before it becomes available to eligible writers.

</div>

</div>

</div>

</body>

  </html>

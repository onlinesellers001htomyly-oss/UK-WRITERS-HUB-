<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Settings | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
}

header{
background:#0D47A1;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.card h2{
margin-top:0;
color:#1565C0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:15px;
width:100%;
background:#1565C0;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Platform Settings</p>

</header>

<div class="container">

<div class="card">

<h2>General Settings</h2>

<label>Website Name</label>

<input type="text" value="UK WRITERS HUB">

<label>Membership Fee (USD)</label>

<input type="number" value="10">

<label>Referral Reward (USD)</label>

<input type="number" value="3">

<label>Minimum Withdrawal (USD)</label>

<input type="number" value="50">

<label>Default Currency</label>

<select>

<option>USD</option>

<option>KES</option>

<option>GBP</option>

<option>EUR</option>

</select>

<button>

Save Settings

</button>

</div>

<div class="card">

<h2>Payment Methods</h2>

<label>Primary Payment Gateway</label>

<select>

<option>Flutterwave</option>

<option>Bank Transfer</option>

<option>PayPal</option>

<option>Payoneer</option>

</select>

<label>Kenya Mobile Money</label>

<select>

<option>Enabled</option>

<option>Disabled</option>

</select>

<button>

Update Payment Settings

</button>

</div>

<div class="card">

<h2>Membership Access</h2>

<label>Require Membership Before Tasks</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

<label>Require Membership Before Withdrawals</label>

<select>

<option>Yes</option>

<option>No</option>

</select>

<button>

Save Access Rules

</button>

</div>

</div>

</body>
  </html>

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Bid | UK WRITERS HUB</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f4f6fb;
}

header{
background:#1565C0;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:900px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
margin-bottom:20px;
}

.card h2{
margin-top:0;
color:#1565C0;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input, textarea{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:14px;
width:100%;
background:#1565C0;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0D47A1;
}

.job-price{
font-size:28px;
font-weight:bold;
color:green;
}

</style>

</head>

<body>

<header>

<h1>UK WRITERS HUB</h1>

<p>Submit Your Bid</p>

</header>

<div class="container">

<div class="card">

<h2>Writing Job</h2>

<p><strong>Title:</strong> Technology Article</p>

<p><strong>Description:</strong> Write a well-researched 1,000-word article about Artificial Intelligence.</p>

<p><strong>Deadline:</strong> 3 Days</p>

<p class="job-price">$25 Budget</p>

</div>

<div class="card">

<h2>Your Proposal</h2>

<form>

<label>Your Bid Amount ($)</label>

<input type="number" placeholder="Enter your bid">

<label>Delivery Time (Days)</label>

<input type="number" placeholder="Example: 2">

<label>Proposal</label>

<textarea rows="6" placeholder="Explain why you are the best person for this task"></textarea>

<button type="submit">

Submit Bid

</button>

</form>

</div>

</div>

</body>
  </html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Submit Project | UK WRITERS HUB</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="header">

<div class="logo">🇬🇧 UK WRITERS HUB</div>

</header>

<section class="section">

<div class="card">

<h2>Submit Completed Project</h2>

<p>

Upload your completed work for the client.

</p>

<input
type="text"
id="projectId"
placeholder="Enter Project ID">

<br><br>

<input
type="file"
id="projectFile">

<br><br>

<textarea
id="submissionMessage"
placeholder="Write a short message to the client..."
rows="5"></textarea>

<br><br>

<button onclick="submitProject()">

Submit Project

</button>

</div>

</section>

<script type="module" src="submit-project.js"></script>

</body>

  </html>
